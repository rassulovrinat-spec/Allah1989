name: Deploy to Timeweb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/mebelny || (git clone https://github.com/rassulovrinat-spec/Allah1989.git /opt/mebelny && cd /opt/mebelny)
            cd /opt/mebelny
            git pull origin main
            cp /root/.env .env 2>/dev/null || true
            docker compose up -d --build
            docker compose ps
