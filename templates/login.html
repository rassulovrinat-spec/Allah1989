<!DOCTYPE html>
<html lang="ru" data-theme="light" data-color="indigo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Мебельные заявки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --p: #4F46E5; --p-light: #EEF2FF; }
        [data-color="blue"]   { --p: #2563EB; }
        [data-color="green"]  { --p: #059669; }
        [data-color="orange"] { --p: #D97706; }
        [data-color="rose"]   { --p: #E11D48; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #F1F5F9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrap {
            width: 100%;
            max-width: 380px;
            padding: 16px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-logo-icon {
            width: 52px; height: 52px;
            background: var(--p);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .login-logo h1 { font-size: 20px; font-weight: 700; color: #0F172A; }
        .login-logo p  { font-size: 13px; color: #94A3B8; margin-top: 3px; }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
        }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #E2E8F0;
            border-radius: 9px;
            font-size: 14px;
            font-family: inherit;
            background: white;
            color: #0F172A;
            outline: none;
            transition: border-color .15s;
        }
        input:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
        .btn-login {
            width: 100%;
            padding: 11px;
            background: var(--p);
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 6px;
            transition: opacity .15s;
        }
        .btn-login:hover { opacity: .9; }
        .error-msg {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FECACA;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-logo">
        <div class="login-logo-icon"><i class="bi bi-box-seam"></i></div>
        <h1>Мебельные заявки</h1>
        <p>Панель управления</p>
    </div>
    <div class="login-card">
        {% if error %}
        <div class="error-msg"><i class="bi bi-exclamation-circle"></i>{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <div style="position:relative">
                    <input type="password" name="password" id="pwd" autocomplete="current-password" required
                           style="padding-right:40px">
                    <button type="button" id="pwd-toggle"
                            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                                   background:none;border:none;cursor:pointer;color:#94A3B8;padding:4px;
                                   display:flex;align-items:center;font-size:16px"
                            onclick="var i=document.getElementById('pwd');var b=document.getElementById('pwd-toggle');
                                     if(i.type==='password'){i.type='text';b.innerHTML='<i class=\'bi bi-eye-slash\'></i>'}
                                     else{i.type='password';b.innerHTML='<i class=\'bi bi-eye\'></i>'}">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-login">Войти</button>
            <div style="text-align:center;margin-top:14px;font-size:12px;color:#94A3B8">
                Забыли пароль? Обратитесь к администратору
            </div>
        </form>
    </div>
</div>
</body>
</html>
