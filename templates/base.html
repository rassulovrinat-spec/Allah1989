<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Панель{% endblock %} — МебельЗаявки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f1f3f5; }
        .navbar-brand { font-weight: 700; letter-spacing: .5px; }
        .table thead th { background: #212529; color: #fff; font-weight: 500; white-space: nowrap; }
        .card { box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    </style>
</head>
<body>
{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/orders"><i class="bi bi-box-seam me-2"></i>МебельЗаявки</a>
        <div class="d-flex gap-3 ms-auto">
            <a class="nav-link text-white" href="/orders"><i class="bi bi-list-ul me-1"></i>Заявки</a>
            <a class="nav-link text-white" href="/factories"><i class="bi bi-building me-1"></i>Фабрики</a>
            <a class="nav-link text-secondary" href="/logout"><i class="bi bi-box-arrow-right me-1"></i>Выйти</a>
        </div>
    </div>
</nav>
{% endblock %}

<div class="container-fluid px-4">
    {% if request.query_params.get('msg') %}
    <div class="alert alert-success alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-check-circle me-2"></i>{{ request.query_params.get('msg') }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    {% if request.query_params.get('err') %}
    <div class="alert alert-danger alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ request.query_params.get('err') }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
